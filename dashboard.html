<style>
        body { font-family: 'Inter', sans-serif; background-color: #0f1419; color: #dee3ea; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-panel { background: rgba(48, 53, 59, 0.7); backdrop-filter: blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased selection:bg-primary-container selection:text-on-primary-container">
<div class="flex min-h-screen">
<!-- Left Rail: SideNavBar -->
<aside class="h-screen sticky top-0 border-r-0 bg-[#0F1419] flex flex-col gap-8 py-6 px-4 w-64 shrink-0 font-['Inter'] antialiased tracking-tight">
<div class="px-2">
<h1 class="text-2xl font-black text-[#DEE3EA] tracking-tighter">EchoChamberAI</h1>
<p class="text-[11px] uppercase tracking-widest text-[#BFC7D3] mt-1">The Digital Oracle</p>
</div>
<nav class="flex flex-col gap-2">
<a class="flex items-center gap-4 px-4 py-3 rounded-full transition-all duration-200 text-[#1D9BF0] font-bold scale-105 bg-[#252A30]" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span>Home</span>
</a>
<a class="flex items-center gap-4 px-4 py-3 rounded-full transition-all duration-200 text-[#BFC7D3] opacity-70 hover:opacity-100 hover:bg-[#252A30]" href="/analytics">
<span class="material-symbols-outlined">analytics</span>
<span>Analytics</span>
</a>
<a class="flex items-center gap-4 px-4 py-3 rounded-full transition-all duration-200 text-[#BFC7D3] opacity-70 hover:opacity-100 hover:bg-[#252A30]" href="/research">
<span class="material-symbols-outlined">explore</span>
<span>Explore</span>
</a>
<a class="flex items-center gap-4 px-4 py-3 rounded-full transition-all duration-200 text-[#BFC7D3] opacity-70 hover:opacity-100 hover:bg-[#252A30]" href="#">
<span class="material-symbols-outlined">person</span>
<span>Profile</span>
</a>
</nav>
<button class="mt-4 bg-primary-container text-on-primary-container font-bold py-4 px-6 rounded-full shadow-lg hover:brightness-110 active:scale-95 transition-all">
  Compose Insight
</button>
<div class="mt-auto flex items-center gap-3 px-2 py-4">
<div class="w-10 h-10 rounded-full bg-surface-container-high ring-2 ring-outline-variant/20 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<div class="overflow-hidden">
<p id="user-name" class="text-sm font-bold truncate">Oracle_Prime</p>
<p id="user-handle" class="text-xs text-on-surface-variant truncate">@prediction_node</p>
</div>
</div>
</aside>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col min-w-0">
<!-- TopNavBar -->
<header class="sticky top-0 z-50 w-full bg-[#0F1419]/70 backdrop-blur-xl border-b border-[#3F4851]/20 h-16 flex justify-between items-center px-6">
<div class="flex items-center gap-4">
<h2 class="text-lg font-bold tracking-tight">Center Feed</h2>
</div>
<div class="flex-1 max-w-xl px-8 hidden md:block">
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
<input class="w-full bg-surface-container-low border-none rounded-full py-2 pl-12 pr-4 focus:ring-1 focus:ring-primary/30 text-sm placeholder:text-on-surface-variant/50" placeholder="Search the Echo..." type="text"/>
</div>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined p-2 hover:bg-surface-container-high rounded-full transition-colors">notifications</button>
<button class="material-symbols-outlined p-2 hover:bg-surface-container-high rounded-full transition-colors">settings</button>
</div>
</header>
<div class="flex-1 flex overflow-hidden">
<!-- Center Feed -->
<section class="flex-1 overflow-y-auto no-scrollbar max-w-2xl mx-auto px-4 py-8 space-y-6">
<div class="flex items-center justify-between mb-2">
  <span class="text-xs uppercase tracking-widest text-on-surface-variant font-bold">Your Posts</span>
  <button onclick="loadFeed()" class="flex items-center gap-1 text-xs text-primary hover:underline">
    <span class="material-symbols-outlined text-sm">refresh</span> Refresh
  </button>
</div>
<div id="feed">
  <div id="feed-loading" class="flex items-center justify-center py-16 gap-3 text-on-surface-variant">
    <span class="material-symbols-outlined">progress_activity</span>
    <span class="text-sm">Loading your feed...</span>
  </div>
</div>
</section>
</div>
<!-- Footer -->
<footer class="w-full py-8 mt-auto border-t border-[#3F4851]/10 flex flex-col items-center justify-center gap-4 text-center">
<p class="font-['Inter'] text-[11px] uppercase tracking-widest text-[#BFC7D3]">© 2024 EchoChamberAI. Predictive Discourse Engine.</p>
<div class="flex gap-6">
<a class="font-['Inter'] text-[11px] uppercase tracking-widest text-[#BFC7D3] hover:text-[#DEE3EA] underline transition-all" href="#">Privacy</a>
<a class="font-['Inter'] text-[11px] uppercase tracking-widest text-[#BFC7D3] hover:text-[#DEE3EA] underline transition-all" href="#">Terms</a>
<a class="font-['Inter'] text-[11px] uppercase tracking-widest text-[#BFC7D3] hover:text-[#DEE3EA] underline transition-all" href="#">API</a>
<a class="font-['Inter'] text-[11px] uppercase tracking-widest text-[#BFC7D3] hover:text-[#DEE3EA] underline transition-all" href="#">Discourse Guidelines</a>
</div>
</footer>
</main>
</div>
<script>
  fetch('/api/me')
    .then(res => {
      if (res.status === 401) { window.location.href = '/'; return null; }
      return res.json();
    })
    .then(user => {
      if (!user) return;
      document.getElementById('user-name').textContent = user.name;
      document.getElementById('user-handle').textContent = '@' + user.username;
    });

  function timeAgo(iso) {
    if (!iso) return '';
    const diff = Math.floor((Date.now() - new Date(iso)) / 60000);
    if (diff < 60) return diff + 'm';
    if (diff < 1440) return Math.floor(diff / 60) + 'h';
    return Math.floor(diff / 1440) + 'd';
  }

  function fmtNum(n) {
    if (!n && n !== 0) return '';
    return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n);
  }

  function cap(s) {
    return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
  }

  function renderThreadCard(thread) {
    const { root, replies } = thread;
    const author = root.author ?? {};
    const avatar = author.profile_image_url
      ? `<img src="${author.profile_image_url}" class="w-8 h-8 rounded-full object-cover flex-shrink-0" alt="">`
      : `<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center flex-shrink-0"><span class="material-symbols-outlined text-xs text-on-surface-variant" style="font-variation-settings:'FILL' 1">person</span></div>`;
    const replySnippets = (replies ?? []).slice(0, 2).map(r =>
      `<p class="text-[11px] text-on-surface-variant leading-relaxed pl-3 border-l-2 border-outline-variant/20 mt-2 italic">${r.text.slice(0, 100)}${r.text.length > 100 ? '…' : ''}</p>`
    ).join('');
    const media = root.media;
    const mediaHtml = media?.type === 'video'
      ? `<video src="${media.url}" ${media.preview ? `poster="${media.preview}"` : ''} autoplay muted loop playsinline class="w-full rounded-lg mt-2 max-h-48 object-cover" style="background:#000"></video>`
      : media?.type === 'photo'
      ? `<img src="${media.url}" class="w-full rounded-lg mt-2 max-h-48 object-cover" alt="" loading="lazy">`
      : '';
    const tweetUrl = root.id && author.username
      ? `https://x.com/${author.username}/status/${root.id}`
      : null;
    return `
      <div class="bg-surface-container rounded-xl px-4 py-3 border border-outline-variant/10 hover:border-outline-variant/30 transition-colors">
        <div class="flex items-start gap-2 mb-2">
          ${avatar}
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1 flex-wrap">
              <span class="text-xs font-bold truncate">${author.name ?? 'Unknown'}</span>
              <span class="text-on-surface-variant text-[10px]">@${author.username ?? '?'}</span>
            </div>
            <p class="text-[12px] leading-snug mt-1 text-on-surface">${root.text}</p>
            ${mediaHtml}
          </div>
        </div>
        ${replySnippets}
        <div class="flex items-center gap-4 mt-2 pt-2 border-t border-outline-variant/10">
          <span class="flex items-center gap-1 text-[10px] text-on-surface-variant">
            <span class="material-symbols-outlined text-xs">favorite</span>${fmtNum(root.public_metrics?.like_count ?? 0)}
          </span>
          <span class="flex items-center gap-1 text-[10px] text-on-surface-variant">
            <span class="material-symbols-outlined text-xs">repeat</span>${fmtNum(root.public_metrics?.retweet_count ?? 0)}
          </span>
          <span class="flex items-center gap-1 text-[10px] text-on-surface-variant">
            <span class="material-symbols-outlined text-xs">chat_bubble</span>${fmtNum(root.public_metrics?.reply_count ?? 0)}
          </span>
          ${tweetUrl ? `<a href="${tweetUrl}" target="_blank" rel="noopener noreferrer"
              class="ml-auto flex items-center gap-1 text-[10px] text-on-surface-variant/40 hover:text-primary transition-colors" title="Open on X">
              <span class="material-symbols-outlined text-xs">open_in_new</span>
            </a>` : ''}
        </div>
      </div>`;
  }

  function renderOracleSection(data, tweetId) {
    const wrapper = document.getElementById('oracle-body-' + tweetId) || document.getElementById('oracle-' + tweetId);
    const el = document.getElementById('oracle-body-' + tweetId) || wrapper;
    if (!el) return;

    if (!data.debatable) {
      el.innerHTML = `
        <div class="mt-6 pt-6 border-t border-outline-variant/10 flex items-center gap-2 text-on-surface-variant/50">
          <span class="material-symbols-outlined text-sm">info</span>
          <span class="text-[11px]">No competing viewpoints detected for this post.</span>
        </div>`;
      return;
    }

    const threadsA = (data.viewpoint_a_threads ?? []).map(renderThreadCard).join('') || '<p class="text-[11px] text-on-surface-variant/60 py-2">No threads found.</p>';
    const threadsB = (data.viewpoint_b_threads ?? []).map(renderThreadCard).join('') || '<p class="text-[11px] text-on-surface-variant/60 py-2">No threads found.</p>';

    el.innerHTML = `
      <div class="mt-6 pt-6 border-t border-outline-variant/10">
        <div class="flex items-center gap-2 mb-3">
          <span class="material-symbols-outlined text-primary-container text-sm" style="font-variation-settings:'FILL' 1">compare_arrows</span>
          <span class="text-[10px] uppercase font-black tracking-widest text-primary-container">Oracle Viewpoints</span>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <p class="text-[10px] uppercase tracking-widest font-black text-primary mb-2">${data.viewpoint_a_label}</p>
            <div class="space-y-2">${threadsA}</div>
          </div>
          <div>
            <p class="text-[10px] uppercase tracking-widest font-black text-error mb-2">${data.viewpoint_b_label}</p>
            <div class="space-y-2">${threadsB}</div>
          </div>
        </div>
      </div>`;
  }

  function setOracleProgress(tweetId, pct, message) {
    const bar = document.getElementById('oracle-bar-' + tweetId);
    const msg = document.getElementById('oracle-msg-' + tweetId);
    const pctEl = document.getElementById('oracle-pct-' + tweetId);
    if (bar) bar.style.width = pct + '%';
    if (msg) msg.textContent = message;
    if (pctEl) pctEl.textContent = pct + '%';
  }

  function analyzeTweet(tweetId, tweetText) {
    // Auto-expand oracle section and show progress bar
    const wrapper = document.getElementById('oracle-' + tweetId);
    const icon = document.getElementById('oracle-toggle-icon-' + tweetId);
    if (wrapper) wrapper.style.display = '';
    if (icon) icon.textContent = 'expand_less';

    const body = document.getElementById('oracle-body-' + tweetId);
    if (body) body.innerHTML = `
      <div class="mt-6 pt-6 border-t border-outline-variant/10">
        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <span class="text-[11px] text-on-surface-variant" id="oracle-msg-${tweetId}">Starting analysis…</span>
            <span class="text-[10px] font-bold text-primary" id="oracle-pct-${tweetId}">0%</span>
          </div>
          <div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
            <div id="oracle-bar-${tweetId}" class="h-full bg-primary rounded-full transition-all duration-500" style="width:0%"></div>
          </div>
        </div>
      </div>`;

    const params = new URLSearchParams({ tweet_id: tweetId, tweet_text: tweetText });
    const source = new EventSource(`/api/feed/analyze-tweet?${params}`);

    source.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === 'progress') {
        setOracleProgress(tweetId, data.pct, data.message);
      } else if (data.type === 'complete') {
        source.close();
        setOracleProgress(tweetId, 100, 'Done');
        setTimeout(() => renderOracleSection(data, tweetId), 300);
      } else if (data.type === 'error') {
        source.close();
        const el = document.getElementById('oracle-body-' + tweetId);
        if (el) el.innerHTML = `<p class="text-[11px] text-on-surface-variant/50 mt-6 pt-6 border-t border-outline-variant/10">${data.message}</p>`;
      }
    };

    source.onerror = () => {
      source.close();
      const el = document.getElementById('oracle-body-' + tweetId);
      if (el) el.innerHTML = '<p class="text-[11px] text-on-surface-variant/50 mt-6 pt-6 border-t border-outline-variant/10">Oracle analysis unavailable right now.</p>';
    };
  }

  function toggleOracle(tweetId) {
    const body = document.getElementById('oracle-body-' + tweetId);
    const icon = document.getElementById('oracle-toggle-icon-' + tweetId);
    const expanded = body.style.display !== 'none';
    body.style.display = expanded ? 'none' : '';
    icon.textContent = expanded ? 'expand_more' : 'expand_less';
  }

  const tweetCache = {};

  function goToTweet(id) {
    const tweet = tweetCache[id];
    if (!tweet) return;
    sessionStorage.setItem('tweet_' + id, JSON.stringify(tweet));
    window.location.href = '/dashboard/' + id;
  }

  function renderCard(tweet) {
    tweetCache[tweet.id] = tweet;
    const avatarHtml = tweet.author.profile_image_url
      ? `<img src="${tweet.author.profile_image_url}" class="w-12 h-12 rounded-full object-cover" alt="${tweet.author.name}">`
      : `<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings:'FILL' 1">person</span>`;
    return `
      <div class="bg-surface-container-low rounded-xl p-6 border border-transparent hover:border-outline-variant/10 transition-colors">
        <div class="flex items-start gap-4">
          <div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center shrink-0 overflow-hidden cursor-pointer" onclick="goToTweet('${tweet.id}')">
            ${avatarHtml}
          </div>
          <div class="flex-1 min-w-0 cursor-pointer" onclick="goToTweet('${tweet.id}')">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-bold text-sm">${tweet.author.name}</span>
              <span class="text-on-surface-variant text-[13px]">@${tweet.author.username} · ${timeAgo(tweet.created_at)}</span>
            </div>
            <p class="mt-2 text-[15px] leading-relaxed">${tweet.text}</p>
          </div>
          <button onclick="event.stopPropagation(); toggleOracle('${tweet.id}')" class="shrink-0 p-1.5 rounded-full hover:bg-surface-container-high transition-colors text-on-surface-variant hover:text-on-surface" title="Toggle Oracle Analysis">
            <span class="material-symbols-outlined text-lg" id="oracle-toggle-icon-${tweet.id}">expand_more</span>
          </button>
        </div>
        <!-- Oracle section: auto-expanded by analyzeTweet -->
        <div id="oracle-${tweet.id}" style="display:none">
          <div id="oracle-body-${tweet.id}"></div>
        </div>
      </div>`;
  }

  function loadFeed() {
    const feed = document.getElementById('feed');
    feed.innerHTML = '<div class="flex items-center justify-center py-16 gap-3 text-on-surface-variant"><span class="material-symbols-outlined">progress_activity</span><span class="text-sm">Loading...</span></div>';
    fetch('/api/feed')
      .then(async res => {
        const data = await res.json();
        if (!res.ok) throw { status: res.status, message: data.error };
        return data;
      })
      .then(tweets => {
        if (!tweets.length) {
          feed.innerHTML = '<p class="text-center text-on-surface-variant py-16">No tweets found.</p>';
          return;
        }
        feed.innerHTML = `<div class="flex flex-col gap-6">${tweets.map(renderCard).join('')}</div>`;
        tweets.forEach(t => analyzeTweet(t.id, t.text));
      })
      .catch(err => {
        if (err.status === 402) {
          feed.innerHTML = `
            <div class="flex flex-col items-center gap-4 py-16 text-center max-w-sm mx-auto">
              <span class="material-symbols-outlined text-4xl text-outline">lock</span>
              <p class="text-sm font-bold">X API upgrade required</p>
              <p class="text-xs text-on-surface-variant leading-relaxed">Upgrade at <a href="https://developer.twitter.com" target="_blank" class="text-primary underline">developer.twitter.com</a>.</p>
            </div>`;
        } else {
          feed.innerHTML = '<p class="text-center text-on-surface-variant py-16">Could not load tweets.</p>';
        }
      });
  }

  loadFeed();
</script>
</body></html>
