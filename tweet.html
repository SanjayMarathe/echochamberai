<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EchoChamberAI | Post</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet"/>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-secondary": "#22323e", "on-background": "#dee3ea", "surface-dim": "#0f1419",
          "surface-variant": "#30353b", "surface-container-lowest": "#0a0f14",
          "surface-container-highest": "#30353b", "surface-tint": "#99cbff",
          "surface-container-low": "#171c21", "secondary": "#b7c9d8",
          "outline": "#89919d", "outline-variant": "#3f4851", "surface": "#0f1419",
          "error": "#ffb4ab", "surface-container": "#1b2025",
          "on-surface-variant": "#bfc7d3", "on-primary": "#003354",
          "primary-fixed-dim": "#99cbff", "on-surface": "#dee3ea",
          "surface-bright": "#353a3f", "primary-fixed": "#cfe5ff",
          "on-primary-fixed": "#001d33", "primary": "#99cbff",
          "secondary-container": "#3a4b57", "on-primary-container": "#003050",
          "primary-container": "#1d9bf0", "tertiary": "#c6c6c7",
          "on-error": "#690005", "background": "#0f1419",
          "surface-container-high": "#252a30"
        },
        fontFamily: { "headline": ["Manrope"], "body": ["Inter"], "label": ["Inter"] },
        borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
      },
    },
  }
</script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background-color: #0b1320;
    color: #dee3ea;
    overflow: hidden;
    height: 100vh;
  }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .glass-card {
    background: rgba(23, 31, 51, 0.5);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(153, 203, 255, 0.08);
  }
  .fade-column {
    mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
  }
  .globe-horizon {
    /* Only top 30% of element is visible (translateY 70%). Mask: transparent below viewport edge,
       fade in at the horizon, fully opaque through the visible arc. */
    mask-image: linear-gradient(to top, rgba(0,0,0,0) 70%, rgba(0,0,0,0.85) 78%, rgba(0,0,0,1) 85%);
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0) 70%, rgba(0,0,0,0.85) 78%, rgba(0,0,0,1) 85%);
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .scroll-col { overflow: hidden; position: relative; }
  .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { display: none !important; }
  #vq-input:empty:before { content: attr(data-placeholder); color: rgba(191,199,211,0.3); pointer-events: none; }
</style>
</head>
<body>

<main class="relative h-screen w-full overflow-hidden">

  <!-- Background radial glow -->
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_30%,rgba(153,203,255,0.04)_0%,transparent_60%)] pointer-events-none z-0"></div>

  <!-- Header -->
  <header class="absolute top-0 left-0 right-0 z-40 flex items-center justify-between px-8 h-16">
    <a href="/dashboard" class="flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors text-sm font-medium">
      <span class="material-symbols-outlined text-lg">arrow_back</span>
      Back
    </a>
    <div class="flex items-center gap-2">
      <span class="text-[10px] uppercase tracking-widest text-on-surface-variant/50 font-bold">EchoChamberAI</span>
    </div>
    <div class="flex items-center gap-2 text-[10px] uppercase tracking-widest text-on-surface-variant/40 font-bold">
      <span class="material-symbols-outlined text-sm">public</span>
      <span id="viewpoint-labels">Analyzing</span>
    </div>
  </header>

  <!-- Main 12-col grid -->
  <div class="relative z-20 w-full h-full max-w-[1440px] mx-auto px-6 grid grid-cols-12 gap-6 items-start pt-20 pb-48">

    <!-- Left column: Viewpoint A -->
    <aside id="col-left" class="hidden lg:flex flex-col gap-2 col-span-3 fade-column" style="height:calc(100vh - 5rem); overflow:hidden;">
      <div class="text-[9px] uppercase tracking-[0.2em] font-bold text-primary/60 mb-1 px-1 shrink-0" id="label-a">—</div>
      <div id="threads-a" class="scroll-col flex-1">
        <!-- skeleton -->
        <div class="glass-card p-4 rounded-xl animate-pulse">
          <div class="flex gap-3"><div class="h-8 w-8 rounded-full bg-surface-container-highest shrink-0"></div><div class="flex-1 space-y-2"><div class="h-2 bg-surface-container-highest rounded w-1/2"></div><div class="h-2 bg-surface-container-highest rounded w-3/4"></div></div></div>
        </div>
        <div class="glass-card p-4 rounded-xl animate-pulse">
          <div class="flex gap-3"><div class="h-8 w-8 rounded-full bg-surface-container-highest shrink-0"></div><div class="flex-1 space-y-2"><div class="h-2 bg-surface-container-highest rounded w-2/3"></div><div class="h-2 bg-surface-container-highest rounded w-1/2"></div></div></div>
        </div>
        <div class="glass-card p-4 rounded-xl animate-pulse">
          <div class="flex gap-3"><div class="h-8 w-8 rounded-full bg-surface-container-highest shrink-0"></div><div class="flex-1 space-y-2"><div class="h-2 bg-surface-container-highest rounded w-3/4"></div><div class="h-2 bg-surface-container-highest rounded w-1/3"></div></div></div>
        </div>
      </div>
    </aside>

    <!-- Center column: Tweet + Oracle metrics -->
    <div class="col-span-12 lg:col-span-6 flex flex-col items-center gap-4 h-full overflow-y-auto pb-6" style="scrollbar-width:none">

      <!-- Tweet card -->
      <div id="tweet-card" class="glass-card w-full max-w-xl p-6 rounded-2xl shadow-2xl shadow-black/40">
        <div class="flex items-center gap-2 text-on-surface-variant/50">
          <span class="material-symbols-outlined text-sm" style="animation: spin 1.5s linear infinite">progress_activity</span>
          <span class="text-xs">Loading…</span>
        </div>
      </div>

      <!-- Oracle metrics / progress -->
      <div id="oracle-center" class="w-full max-w-xl">
        <!-- progress bar shown first, then replaced with metrics pills -->
        <div class="glass-card p-4 rounded-xl" id="progress-card">
          <div class="flex justify-between mb-1.5">
            <span class="text-[11px] text-on-surface-variant" id="progress-msg">Starting…</span>
            <span class="text-[10px] font-bold text-primary" id="progress-pct">0%</span>
          </div>
          <div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
            <div id="progress-bar" class="h-full bg-primary rounded-full transition-all duration-500" style="width:0%"></div>
          </div>
        </div>
      </div>

      <!-- Video Query Panel -->
      <div id="video-query-panel" class="w-full max-w-xl hidden">
        <div class="glass-card p-4 rounded-xl">
          <div class="flex items-center gap-2 mb-3">
            <span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1">video_search</span>
            <span class="text-base font-black text-on-surface">Ask the Authors</span>
          </div>
          <div class="flex gap-2">
            <div id="vq-input" contenteditable="true" role="textbox" spellcheck="false"
                 data-placeholder="e.g. @BernieSanders summarize your video"
                 class="flex-1 bg-surface-container-highest text-on-surface text-[12px] rounded-full px-4 py-2 outline-none border border-outline-variant/20 focus:border-primary/40 transition-colors min-h-[36px] leading-relaxed cursor-text"></div>
            <button id="vq-submit" class="flex items-center gap-1.5 pl-2 pr-1 h-9 rounded-full bg-white hover:opacity-90 active:scale-95 transition-all shrink-0">
              <span class="text-[10px] font-black text-black tracking-wide">Live</span>
              <div class="w-7 h-7 rounded-full bg-white flex items-center justify-center overflow-hidden">
                <img src="/images/geminilogo.png" class="w-full h-full object-contain" alt="Ask">
              </div>
            </button>
          </div>
          <div id="vq-dropdown" class="hidden mt-1 bg-surface-container-high border border-outline-variant/20 rounded-xl overflow-hidden shadow-xl max-h-48 overflow-y-auto"></div>
          <div id="vq-results" class="mt-3 flex flex-col hidden"></div>
        </div>
      </div>

      <!-- Contextual hints -->
      <div class="flex gap-6 mt-2">
        <div class="flex items-center gap-1.5 text-on-surface-variant/40 text-[10px] font-label uppercase tracking-[0.15em]">
          <span class="material-symbols-outlined text-xs">public</span>
          <span>Global visibility</span>
        </div>
        <div class="flex items-center gap-1.5 text-on-surface-variant/40 text-[10px] font-label uppercase tracking-[0.15em]">
          <span class="material-symbols-outlined text-xs">compare_arrows</span>
          <span>Dual viewpoints</span>
        </div>
      </div>
    </div>

    <!-- Right column: Viewpoint B -->
    <aside id="col-right" class="hidden lg:flex flex-col gap-2 col-span-3 fade-column" style="height:calc(100vh - 5rem); overflow:hidden;">
      <div class="text-[9px] uppercase tracking-[0.2em] font-bold text-error/60 mb-1 px-1 shrink-0" id="label-b">—</div>
      <div id="threads-b" class="scroll-col flex-1">
        <!-- skeleton -->
        <div class="glass-card p-4 rounded-xl animate-pulse">
          <div class="flex gap-3"><div class="h-8 w-8 rounded-full bg-surface-container-highest shrink-0"></div><div class="flex-1 space-y-2"><div class="h-2 bg-surface-container-highest rounded w-1/2"></div><div class="h-2 bg-surface-container-highest rounded w-3/4"></div></div></div>
        </div>
        <div class="glass-card p-4 rounded-xl animate-pulse">
          <div class="flex gap-3"><div class="h-8 w-8 rounded-full bg-surface-container-highest shrink-0"></div><div class="flex-1 space-y-2"><div class="h-2 bg-surface-container-highest rounded w-2/3"></div><div class="h-2 bg-surface-container-highest rounded w-1/2"></div></div></div>
        </div>
        <div class="glass-card p-4 rounded-xl animate-pulse">
          <div class="flex gap-3"><div class="h-8 w-8 rounded-full bg-surface-container-highest shrink-0"></div><div class="flex-1 space-y-2"><div class="h-2 bg-surface-container-highest rounded w-3/4"></div><div class="h-2 bg-surface-container-highest rounded w-1/3"></div></div></div>
        </div>
      </div>
    </aside>
  </div>

  <!-- Globe — 30% visible at bottom -->
  <div id="globe-wrap" class="absolute bottom-0 left-1/2 z-10 pointer-events-none globe-horizon opacity-90" style="-webkit-transform: translateX(-50%) translateY(75%); transform: translateX(-50%) translateY(75%);">
    <div class="relative rounded-full overflow-hidden border-t border-primary/15" style="width:130vw; height:130vw;">
      <div id="map" style="position:absolute;top:0;left:0;right:0;bottom:0;"></div>
    </div>
  </div>

</main>

<script>
  const tweetId = location.pathname.split('/dashboard/')[1];

  function timeAgo(iso) {
    if (!iso) return '';
    const diff = Math.floor((Date.now() - new Date(iso)) / 60000);
    if (diff < 60) return diff + 'm';
    if (diff < 1440) return Math.floor(diff / 60) + 'h';
    return Math.floor(diff / 1440) + 'd';
  }

  function fmtNum(n) {
    if (!n && n !== 0) return '';
    return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n);
  }

  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

  // Render the main tweet card
  function renderTweet(tweet) {
    const avatar = tweet.author?.profile_image_url
      ? `<img src="${tweet.author.profile_image_url}" class="h-12 w-12 rounded-full object-cover ring-1 ring-primary/20 flex-shrink-0" alt="">`
      : `<div class="h-12 w-12 rounded-full bg-surface-container-highest ring-1 ring-primary/20 flex-shrink-0 flex items-center justify-center"><span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1">person</span></div>`;
    document.getElementById('tweet-card').innerHTML = `
      <div class="flex gap-4">
        ${avatar}
        <div class="flex-1">
          <div class="flex items-baseline justify-between mb-1">
            <div class="flex items-baseline gap-2">
              <span class="font-bold text-on-surface">${tweet.author?.name ?? '—'}</span>
              <span class="text-sm text-on-surface-variant/60">@${tweet.author?.username ?? '—'} · ${timeAgo(tweet.created_at)}</span>
            </div>
          </div>
          <p class="text-[1.05rem] leading-relaxed text-on-surface font-light mt-1">${tweet.text}</p>
        </div>
      </div>`;
    document.title = `EchoChamberAI | ${tweet.author?.name ?? 'Post'}`;
  }

  // Render a single thread as a glass card
  function renderThreadCard(thread) {
    const { root, replies } = thread;
    const author = root.author ?? {};
    const avatar = author.profile_image_url
      ? `<img src="${author.profile_image_url}" class="h-8 w-8 rounded-full object-cover flex-shrink-0" alt="">`
      : `<div class="h-8 w-8 rounded-full bg-surface-container-highest flex-shrink-0 flex items-center justify-center"><span class="material-symbols-outlined text-xs" style="font-variation-settings:'FILL' 1">person</span></div>`;
    const snippet = (replies ?? []).slice(0, 1).map(r =>
      `<p class="text-[10px] text-on-surface-variant/60 leading-snug pl-2 border-l border-outline-variant/20 mt-2 italic">${r.text.slice(0, 90)}${r.text.length > 90 ? '…' : ''}</p>`
    ).join('');
    const media = root.media;
    const mediaHtml = media?.type === 'video'
      ? `<video src="${media.url}" ${media.preview ? `poster="${media.preview}"` : ''} autoplay muted loop playsinline class="w-full rounded-lg mt-2 max-h-36 object-cover" style="background:#000"></video>`
      : media?.type === 'photo'
      ? `<img src="${media.url}" class="w-full rounded-lg mt-2 max-h-36 object-cover" alt="" loading="lazy">`
      : '';
    const tweetUrl = root.id && author.username
      ? `https://x.com/${author.username}/status/${root.id}`
      : null;
    const externalLink = tweetUrl
      ? `<a href="${tweetUrl}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()"
            class="shrink-0 ml-1 text-on-surface-variant/30 hover:text-primary transition-colors" title="Open on X">
           <span class="material-symbols-outlined text-sm">open_in_new</span>
         </a>`
      : '';
    return `
      <div class="glass-card p-4 rounded-xl hover:border-primary/20 transition-colors">
        <div class="flex gap-3">
          ${avatar}
          <div class="flex-1 min-w-0">
            <div class="flex justify-between items-center mb-1">
              <span class="text-xs font-bold text-on-surface truncate">${author.name ?? 'Unknown'}</span>
              <div class="flex items-center gap-1 shrink-0 ml-2">
                <span class="text-[10px] text-on-surface-variant/50">${fmtNum(root.public_metrics?.like_count ?? 0)} ♥</span>
                ${externalLink}
              </div>
            </div>
            <p class="text-[11px] text-on-surface-variant/80 line-clamp-2 leading-snug">${root.text}</p>
            ${mediaHtml}
            ${snippet}
          </div>
        </div>
      </div>`;
  }

  // Render oracle metrics pill row in center
  function renderOracleMetrics(data) {
    const biasScore = data.bias_score ?? 50;
    const biasLabel = biasScore < 20 ? 'Neutral' : biasScore < 40 ? 'Slight' : biasScore < 65 ? 'Moderate' : 'Strong';
    const biasColor = biasScore < 30 ? 'bg-emerald-500' : biasScore < 55 ? 'bg-primary' : 'bg-error';
    const sentimentIcon = { neutral: 'balance', analytical: 'analytics', hopeful: 'sentiment_satisfied', alarmist: 'warning', angry: 'sentiment_very_dissatisfied', sarcastic: 'theater_comedy' }[data.sentiment] ?? 'help';
    const echoColor = { low: 'text-emerald-400', medium: 'text-amber-400', high: 'text-error' }[data.echo_chamber_risk] ?? 'text-on-surface-variant';
    const discourseIcon = { geopolitical: 'public', economic: 'trending_up', social: 'groups', technology: 'memory', cultural: 'museum', other: 'category' }[data.discourse_type] ?? 'category';

    const pctA = data.viewpoint_balance ?? 50;
    const pctB = 100 - pctA;
    const balanceBar = data.total_engagement > 0 ? `
      <div class="mt-3 pt-3 border-t border-outline-variant/10">
        <div class="flex h-1 rounded-full overflow-hidden gap-px">
          <div class="bg-primary rounded-l-full" style="width:${pctA}%"></div>
          <div class="bg-error rounded-r-full" style="width:${pctB}%"></div>
        </div>
        <div class="flex justify-between mt-1">
          <span class="text-[9px] text-primary">${pctA}%</span>
          <span class="text-[9px] text-on-surface-variant/50">${fmtNum(data.total_engagement)} engagements</span>
          <span class="text-[9px] text-error">${pctB}%</span>
        </div>
      </div>` : '';

    document.getElementById('oracle-center').innerHTML = `
      <div class="glass-card rounded-xl overflow-hidden">
        <button onclick="toggleOracle()" class="w-full flex items-center justify-between px-5 py-3 hover:bg-surface-container/40 transition-colors">
          <span class="text-[9px] uppercase tracking-widest font-black text-on-surface-variant/50">Analysis</span>
          <span class="material-symbols-outlined text-on-surface-variant/40 text-sm" id="oracle-chevron">expand_less</span>
        </button>
        <div id="oracle-body" class="px-5 pb-4">
        <div class="grid grid-cols-2 gap-x-6 gap-y-4">

          <!-- Bias -->
          <div>
            <div class="flex justify-between items-baseline mb-1.5">
              <span class="text-[9px] uppercase tracking-widest font-bold text-on-surface-variant/50">Bias</span>
              <span class="text-[11px] font-black ${biasScore < 30 ? 'text-emerald-400' : biasScore < 55 ? 'text-primary' : 'text-error'}">${biasLabel}</span>
            </div>
            <div class="h-1 w-full bg-surface-container-highest rounded-full overflow-hidden">
              <div class="h-full ${biasColor} rounded-full transition-all" style="width:${biasScore}%"></div>
            </div>
          </div>

          <!-- Echo Chamber Risk -->
          <div>
            <div class="flex justify-between items-baseline mb-1.5">
              <span class="text-[9px] uppercase tracking-widest font-bold text-on-surface-variant/50">Echo Risk</span>
              <span class="text-[11px] font-black ${echoColor}">${cap(data.echo_chamber_risk)}</span>
            </div>
            <div class="h-1 w-full bg-surface-container-highest rounded-full overflow-hidden">
              <div class="h-full rounded-full transition-all ${data.echo_chamber_risk === 'low' ? 'bg-emerald-500' : data.echo_chamber_risk === 'medium' ? 'bg-amber-400' : 'bg-error'}"
                   style="width:${{ low: 33, medium: 66, high: 100 }[data.echo_chamber_risk] ?? 50}%"></div>
            </div>
          </div>

          <!-- Sentiment -->
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-on-surface-variant/60 text-base">${sentimentIcon}</span>
            <div>
              <p class="text-[9px] uppercase tracking-widest font-bold text-on-surface-variant/50">Sentiment</p>
              <p class="text-[11px] font-bold text-on-surface">${cap(data.sentiment)}</p>
            </div>
          </div>

          <!-- Discourse Type -->
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-on-surface-variant/60 text-base">${discourseIcon}</span>
            <div>
              <p class="text-[9px] uppercase tracking-widest font-bold text-on-surface-variant/50">Discourse</p>
              <p class="text-[11px] font-bold text-on-surface">${cap(data.discourse_type)}</p>
            </div>
          </div>

        </div>

        ${data.total_engagement > 0 ? `
        <div class="mt-4 pt-3 border-t border-outline-variant/10">
          <div class="flex justify-between items-baseline mb-1.5">
            <span class="text-[9px] uppercase tracking-widest font-bold text-primary">${data.viewpoint_a_label ?? 'A'}</span>
            <span class="text-[9px] text-on-surface-variant/40">${fmtNum(data.total_engagement)} engagements</span>
            <span class="text-[9px] uppercase tracking-widest font-bold text-error">${data.viewpoint_b_label ?? 'B'}</span>
          </div>
          <div class="flex h-1.5 rounded-full overflow-hidden">
            <div class="bg-primary" style="width:${pctA}%"></div>
            <div class="bg-error" style="width:${pctB}%"></div>
          </div>
          <div class="flex justify-between mt-1">
            <span class="text-[9px] font-black text-primary">${pctA}%</span>
            <span class="text-[9px] font-black text-error">${pctB}%</span>
          </div>
        </div>` : ''}
        </div><!-- /oracle-body -->
      </div>

      <div class="glass-card rounded-xl p-4 mt-3">
        <div class="flex items-center justify-between mb-3">
          <span class="text-[9px] uppercase tracking-widest font-black text-on-surface-variant/50 flex items-center gap-1.5">
            <span class="material-symbols-outlined text-xs" style="font-variation-settings:'FILL' 1">movie</span>
            Debate Video
          </span>
          <button onclick="generateDebateVideo()" id="vg-btn"
            class="hidden flex items-center gap-1 px-2.5 py-1 rounded-full bg-primary/10 border border-primary/20 text-[10px] font-bold text-primary hover:bg-primary/20 active:scale-95 transition-all">
            <span class="material-symbols-outlined text-xs" style="font-variation-settings:'FILL' 1">replay</span>
            Regenerate
          </button>
        </div>
        <div id="vg-panel">
          <div id="vg-progress" class="space-y-1.5">
            <div class="flex justify-between">
              <span class="text-[10px] text-on-surface-variant" id="vg-msg">Queuing…</span>
              <span class="text-[10px] font-bold text-primary" id="vg-pct">0%</span>
            </div>
            <div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
              <div id="vg-bar" class="h-full bg-primary rounded-full transition-all duration-500" style="width:0%"></div>
            </div>
          </div>
          <div id="vg-video-wrap" class="hidden relative mt-3">
            <video id="vg-video" class="w-full rounded-xl max-h-64" controls playsinline></video>
            <a id="vg-tweet-link" href="#" target="_blank" rel="noopener noreferrer"
               class="hidden absolute bottom-2 right-2 flex items-center gap-1 px-2 py-1 rounded-full text-[10px] font-black text-white bg-black/70 backdrop-blur-sm hover:bg-black/90 active:scale-95 transition-all"
               style="z-index:10">

  async function checkOrStartVideo() {
    const panel = document.getElementById('vg-panel');
    if (!panel) return;

    let job = { status: 'none' };
    try {
      job = await fetch(`/api/video-job/${tweetId}`).then(r => r.json());
    } catch (_) {
      // server not ready or route missing — just start generation
    }

    if (job.status === 'complete') {
      document.getElementById('vg-progress').classList.add('hidden');
      document.getElementById('vg-video').src = job.video_url;
      document.getElementById('vg-video-wrap').classList.remove('hidden');
      document.getElementById('vg-btn').classList.remove('hidden');
      document.getElementById('qa-hint')?.classList.remove('hidden');
      if (job.tweet_url) {
        const link = document.getElementById('vg-tweet-link');
        link.href = job.tweet_url;
        link.classList.remove('hidden');
      }
      return;
    }

    // Not done yet — open SSE (handles 'processing' via server-side polling too)
    generateDebateVideo();
  }

  function generateDebateVideo() {
    const btn = document.getElementById('vg-btn');
    const panel = document.getElementById('vg-panel');
    const progressEl = document.getElementById('vg-progress');

    if (!panel) return; // oracle card not rendered yet
    btn.classList.add('hidden');
    progressEl.classList.remove('hidden');
    document.getElementById('vg-video-wrap').classList.add('hidden');

    const source = new EventSource(`/api/generate-debate-video/${tweetId}`);
    source.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === 'progress') {
        document.getElementById('vg-bar').style.width = data.pct + '%';
        document.getElementById('vg-msg').textContent = data.message;
        document.getElementById('vg-pct').textContent = data.pct + '%';
      } else if (data.type === 'complete') {
        source.close();
        progressEl.classList.add('hidden');
        document.getElementById('vg-video').src = data.videoUrl;
        document.getElementById('vg-video-wrap').classList.remove('hidden');
        btn.classList.remove('hidden');
        document.getElementById('qa-hint')?.classList.remove('hidden');
        if (data.tweetUrl) {
          const link = document.getElementById('vg-tweet-link');
          link.href = data.tweetUrl;
          link.classList.remove('hidden');
        }
      } else if (data.type === 'error') {
        source.close();
        document.getElementById('vg-msg').textContent = '⚠ ' + data.message;
        progressEl.classList.remove('hidden');
        btn.classList.remove('hidden');
      }
    };
  }

  function toggleOracle() {
    const body = document.getElementById('oracle-body');
    const chevron = document.getElementById('oracle-chevron');
    if (!body) return;
    const collapsed = body.style.display === 'none';
    body.style.display = collapsed ? '' : 'none';
    if (chevron) chevron.textContent = collapsed ? 'expand_less' : 'expand_more';
  }

  // JS scroll engine — uses transform for reliable infinite scroll with overflow:hidden
  function startCarousel(containerId, speedPx = 0.2) {
    const container = document.getElementById(containerId);
    if (!container) return;
    const track = container.querySelector('.carousel-track');
    if (!track) return;

    // Wrap both original + clone in an inner scroller div
    const scroller = document.createElement('div');
    scroller.style.cssText = 'position:absolute;top:0;left:0;right:0;will-change:transform;';

    // Move track into scroller
    container.innerHTML = '';
    scroller.appendChild(track);

    // Clone for seamless loop
    const clone = track.cloneNode(true);
    scroller.appendChild(clone);
    container.appendChild(scroller);

    const trackH = track.offsetHeight;
    if (trackH === 0) return; // nothing to scroll

    let pos = 0;
    let paused = false;
    container.addEventListener('mouseenter', () => { paused = true; });
    container.addEventListener('mouseleave', () => { paused = false; });

    function tick() {
      if (!paused) {
        pos += speedPx;
        if (pos >= trackH) pos = 0;
        scroller.style.transform = `translateY(${-pos}px)`;
      }
      requestAnimationFrame(tick);
    }
    tick();
  }

  function renderColumns(data) {
    document.getElementById('label-a').textContent = data.viewpoint_a_label ?? 'Viewpoint A';
    document.getElementById('label-b').textContent = data.viewpoint_b_label ?? 'Viewpoint B';
    document.getElementById('viewpoint-labels').textContent =
      `${data.viewpoint_a_label} vs ${data.viewpoint_b_label}`;

    const threadsA = data.viewpoint_a_threads ?? [];
    const threadsB = data.viewpoint_b_threads ?? [];

    function injectCarousel(elId, threads) {
      const el = document.getElementById(elId);
      if (!threads.length) {
        el.innerHTML = '<p class="text-[11px] text-on-surface-variant/40 px-1 pt-2">No threads found.</p>';
        return;
      }
      el.style.overflow = 'hidden';
      el.style.position = 'relative';
      el.innerHTML = `<div class="carousel-track flex flex-col gap-3 pb-3">${threads.map(renderThreadCard).join('')}</div>`;
      // Delay to ensure layout is computed before measuring offsetHeight
      requestAnimationFrame(() => startCarousel(elId));
    }

    injectCarousel('threads-a', threadsA);
    injectCarousel('threads-b', threadsB);

    // Collect all video tweets for the query panel
    const allThreads = [
      ...threadsA.map(t => ({ ...t, _side: 'a' })),
      ...threadsB.map(t => ({ ...t, _side: 'b' })),
    ];
    // Include ALL threads (video and text) for Ask the Authors
    window._videoTweets = allThreads.map(t => ({
      url: t.root?.media?.type === 'video' ? t.root.media.url : null,
      tweetText: t.root?.text ?? '',
      authorName: t.root?.author?.name ?? '',
      authorUsername: t.root?.author?.username ?? '',
      side: t._side,
    }));

    // Build deduplicated author list for @mention dropdown
    const seenUsernames = new Set();
    window._pageAuthors = [];
    for (const t of allThreads) {
      const a = t.root?.author;
      if (!a?.username || seenUsernames.has(a.username)) continue;
      seenUsernames.add(a.username);
      window._pageAuthors.push({ name: a.name ?? a.username, username: a.username, avatar: a.profile_image_url ?? null });
    }

    if (window._videoTweets.length > 0) {
      document.getElementById('video-query-panel').classList.remove('hidden');
    }
  }

  function setProgress(pct, msg) {
    const bar = document.getElementById('progress-bar');
    const msgEl = document.getElementById('progress-msg');
    const pctEl = document.getElementById('progress-pct');
    if (bar) bar.style.width = pct + '%';

  // Init Mapbox globe
  async function initGlobe() {
    try {
      const res = await fetch('/api/mapbox-token');
      const { token } = await res.json();
      if (!token) return;
      mapboxgl.accessToken = token;
      const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/satellite-v9',
        projection: 'globe',
        zoom: 1.5,
        center: [15, 20],
        interactive: false,
        attributionControl: false,
      });
      map.on('style.load', () => {
        map.setFog({
          color: 'rgb(20, 40, 80)',
          'high-color': 'rgb(8, 18, 50)',
          'horizon-blend': 0.06,
          'space-color': 'rgb(5, 8, 20)',
          'star-intensity': 0.5,
        });
      });
    } catch {}
  }

  // Start SSE analysis
  function startAnalysis(tweet) {
    const params = new URLSearchParams({ tweet_id: tweet.id, tweet_text: tweet.text });
    const source = new EventSource(`/api/feed/analyze-tweet?${params}`);

    source.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === 'progress') {
        setProgress(data.pct, data.message);
      } else if (data.type === 'complete') {
        source.close();
        setProgress(100, 'Done');
        setTimeout(() => {
          if (data.debatable) {
            renderOracleMetrics(data);
            renderColumns(data);
            checkOrStartVideo();
          } else {
            document.getElementById('oracle-center').innerHTML =
              '<div class="glass-card p-4 rounded-xl text-[11px] text-on-surface-variant/50">No competing viewpoints detected.</div>';
            document.getElementById('viewpoint-labels').textContent = 'No viewpoints';
            document.getElementById('threads-a').innerHTML = '';
            document.getElementById('threads-b').innerHTML = '';
          }
        }, 300);
      } else if (data.type === 'error') {
        source.close();
        document.getElementById('oracle-center').innerHTML =
          `<div class="glass-card p-4 rounded-xl text-[11px] text-on-surface-variant/50">${data.message}</div>`;
      }
    };

    source.onerror = () => {
      source.close();
      document.getElementById('oracle-center').innerHTML =
        '<div class="glass-card p-4 rounded-xl text-[11px] text-on-surface-variant/50">Oracle analysis unavailable.</div>';
    };
  }

  // Boot
  initGlobe();

  async function boot() {
    const stored = sessionStorage.getItem('tweet_' + tweetId);
    if (stored) {
      const tweet = JSON.parse(stored);
      renderTweet(tweet);
      startAnalysis(tweet);
    } else {
      // Fallback: fetch tweet via public oEmbed proxy
      try {
        const r = await fetch(`/api/tweet/${tweetId}`);
        if (!r.ok) throw new Error();
        const tweet = await r.json();
        renderTweet(tweet);
        startAnalysis(tweet);
      } catch {
        document.getElementById('tweet-card').innerHTML =
          '<p class="text-sm text-on-surface-variant">Tweet not found.</p>';
        document.getElementById('oracle-center').innerHTML = '';
      }
    }
  }
  boot();

  function fmtTs(secs) {

  function renderClip(clip, idx) {
    const rawScore = clip.score ?? 0;
    const pct = Math.min(Math.round(rawScore), 100);
    const side = clip.meta?.side ?? 'a';
    const sideColor = side === 'a' ? 'text-primary' : 'text-error';
    const sideBg = side === 'a' ? 'bg-primary' : 'bg-error';
    const author = clip.meta?.authorName ?? '';
    const answer = clip.answer ?? clip.meta?.tweetText ?? '';
    const hasVideo = !!clip.meta?.url;
    window._clips[idx] = {
      url: clip.meta?.url ?? '',
      start: clip.start ?? 0,
      authorName: author,
      tweetText: clip.meta?.tweetText ?? '',
    };
    return `
      <div class="flex items-start gap-3 py-2 border-t border-outline-variant/10 px-1 rounded transition-colors ${hasVideo ? 'cursor-pointer hover:bg-surface-container/40' : ''}"
           ${hasVideo ? `onclick="openVideoPopup(${idx})"` : ''}>
        ${hasVideo
          ? `<span class="material-symbols-outlined text-sm ${sideColor} shrink-0 pt-0.5" style="font-variation-settings:'FILL' 1">play_circle</span>`
          : `<span class="material-symbols-outlined text-sm text-on-surface-variant/30 shrink-0 pt-0.5">format_quote</span>`}
        <div class="flex-1 min-w-0">
          <p class="text-[11px] text-on-surface leading-snug">${answer}</p>
          <div class="flex items-center gap-2 mt-1">
            <span class="text-[9px] ${sideColor} opacity-70 font-bold shrink-0">@${clip.meta?.authorUsername ?? author}</span>
            <div class="flex-1 h-px ${sideBg} opacity-40" style="max-width:${pct}%"></div>
            <span class="text-[9px] text-on-surface-variant/40 shrink-0">${pct}%</span>
          </div>
        </div>
      </div>`;
  }

  // ── @mention dropdown ─────────────────────────────────────────────────────
  function hideDropdown() { document.getElementById('vq-dropdown').classList.add('hidden'); }

  function renderDropdown(authors, atToken) {
    const dd = document.getElementById('vq-dropdown');
    if (!authors.length) { hideDropdown(); return; }
    dd.classList.remove('hidden');
    dd.innerHTML = authors.map(a => `
      <button class="w-full flex items-center gap-2 px-3 py-2 hover:bg-surface-variant text-left transition-colors"
              data-username="${a.username}" data-name="${a.name.replace(/"/g, '')}">
        ${a.avatar
          ? `<img src="${a.avatar}" class="w-6 h-6 rounded-full object-cover shrink-0">`
          : `<div class="w-6 h-6 rounded-full bg-surface-container-highest shrink-0 flex items-center justify-center"><span class="material-symbols-outlined text-[10px]">person</span></div>`}
        <span class="text-xs font-bold text-on-surface truncate">${a.name}</span>
        <span class="text-[10px] text-on-surface-variant/50 ml-auto shrink-0">@${a.username}</span>
      </button>`).join('');
    dd.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('mousedown', e => {
        e.preventDefault();
        selectMention({ name: btn.dataset.name, username: btn.dataset.username }, atToken);
      });
    });
  }

  function selectMention(author, atToken) {
    const vqEl = document.getElementById('vq-input');
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);

    // Delete the @partial text the user typed
    range.setStart(range.startContainer, range.startOffset - atToken.length);
    range.deleteContents();

    // Insert a highlighted, non-editable @Name span
    const span = document.createElement('span');
    span.className = 'text-primary font-bold';
    span.dataset.mention = author.username;
    span.contentEditable = 'false';
    span.textContent = '@' + author.name;
    range.insertNode(span);

    // Move cursor after span with a space
    const space = document.createTextNode('\u00A0');
    span.after(space);
    const newRange = document.createRange();
    newRange.setStartAfter(space);
    newRange.collapse(true);
    sel.removeAllRanges();
    sel.addRange(newRange);

    window._selectedMentions.push(author);
    hideDropdown();
    vqEl.focus();
  }

  const vqInput = document.getElementById('vq-input');

  vqInput?.addEventListener('input', () => {
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    const node = range.startContainer;
    // Only trigger on text nodes
    if (node.nodeType !== Node.TEXT_NODE) { hideDropdown(); return; }
    const textBefore = node.textContent.slice(0, range.startOffset);
    const atMatch = textBefore.match(/@([\w ]*)$/);
    if (!atMatch) { hideDropdown(); return; }
    const partial = atMatch[1].toLowerCase();
    const filtered = window._pageAuthors.filter(a =>
      !window._selectedMentions.some(m => m.username === a.username) &&
      (a.name.toLowerCase().includes(partial) || a.username.toLowerCase().includes(partial))
    );
    renderDropdown(filtered, atMatch[0]);
  });

  vqInput?.addEventListener('blur', () => setTimeout(hideDropdown, 150));
  vqInput?.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') hideDropdown();
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('vq-submit').click(); }
  });

  document.getElementById('vq-submit')?.addEventListener('click', async () => {
    const vqEl = document.getElementById('vq-input');
    const resultsEl = document.getElementById('vq-results');
    const btn = document.getElementById('vq-submit');
    const query = vqEl.innerText.trim();
    if (!query && !window._selectedMentions.length) return;
    if (!window._videoTweets.length) return;

    // Sync mentions from DOM spans (handles deletions)
    window._selectedMentions = Array.from(vqEl.querySelectorAll('[data-mention]'))
      .map(s => ({ username: s.dataset.mention, name: s.textContent.replace(/^@/, '') }));

    const videosToQuery = window._selectedMentions.length > 0
      ? window._videoTweets.filter(v =>
          window._selectedMentions.some(m => m.username === v.authorUsername || m.name === v.authorName)
        )
      : window._videoTweets;

    if (window._selectedMentions.length > 0 && videosToQuery.length === 0) {
      resultsEl.classList.remove('hidden');
      const names = window._selectedMentions.map(m => '@' + m.name).join(', ');
      resultsEl.innerHTML = `<p class="text-[11px] text-on-surface-variant/40 py-1">${names} ${window._selectedMentions.length > 1 ? 'have' : 'has'} no tweets in this analysis.</p>`;
      return;
    }

    const mentionLabel = window._selectedMentions.length > 0
      ? `for ${window._selectedMentions.map(m => '@' + m.name).join(', ')} — `
      : '';

    // Collapse oracle card when query starts
    const oracleBody = document.getElementById('oracle-body');
    const oracleChevron = document.getElementById('oracle-chevron');
    if (oracleBody) { oracleBody.style.display = 'none'; if (oracleChevron) oracleChevron.textContent = 'expand_more'; }

    btn.disabled = true;
    resultsEl.classList.remove('hidden');
    resultsEl.innerHTML = `
      <div class="flex items-center gap-2 text-[11px] text-on-surface-variant/60 py-2">
        <span class="material-symbols-outlined text-primary text-sm animate-spin">progress_activity</span>
        Searching${mentionLabel ? ' ' + mentionLabel : '…'}
      </div>`;

    try {
      const r = await fetch('/api/video-query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: query || 'summarize', videos: videosToQuery }),
      });
      const { clips, error } = await r.json();
      if (error) throw new Error(error);
      if (!clips?.length) {
        resultsEl.innerHTML = '<p class="text-[11px] text-on-surface-variant/40 py-1">No matching moments found.</p>';
      } else {
        window._clips = [];
        resultsEl.innerHTML = clips.map((c, i) => renderClip(c, i)).join('');
      }
    } catch (err) {
      resultsEl.innerHTML = `<p class="text-[11px] text-on-surface-variant/40 py-1">${err.message}</p>`;
    } finally {
      btn.disabled = false;
    }
  });

  // ── Space-to-Ask interactive video Q&A ──────────────────────────────────
  let spaceHeld = false;
  let qaActive = false;
  let pausedAt = 0;
  let mediaRecorder = null;
  let audioChunks = [];

  function setQaMsg(msg) {
    const el = document.getElementById('qa-bar-msg');
    if (el) el.textContent = msg;
  }

  async function startListening() {
    const videoEl = document.getElementById('vg-video');
    if (!videoEl) return;
    pausedAt = videoEl.currentTime;
    videoEl.pause();
    qaActive = true;
    audioChunks = [];

    const bar = document.getElementById('qa-bar');
    const hint = document.getElementById('qa-hint');
    if (bar) bar.classList.remove('hidden');
    if (hint) hint.classList.add('hidden');
    setQaMsg('Listening…');

    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.start();
    } catch (err) {
      setQaMsg('Mic access denied');
      setTimeout(() => resumeVideo(), 1500);
    }
  }

  async function stopListeningAndAsk() {
    if (!qaActive) return;

    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
      resumeVideo();
      return;
    }

    await new Promise(resolve => {
      mediaRecorder.onstop = resolve;
      mediaRecorder.stop();
      mediaRecorder.stream?.getTracks().forEach(t => t.stop());
    });

    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    audioChunks = [];

    if (blob.size < 1000) { resumeVideo(); return; }

    setQaMsg('Transcribing…');
    let transcript = '';
    try {
      const r = await fetch('/api/stt', { method: 'POST', headers: { 'Content-Type': 'audio/webm' }, body: blob });
      const data = await r.json();
      transcript = data.transcript?.trim() ?? '';
    } catch (_) {}

    if (!transcript) { resumeVideo(); return; }

    setQaMsg('Thinking…');
    let audioUrl = null;
    try {
      const r = await fetch(`/api/ask/${tweetId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: transcript, speakerIndex: 0 }),
      });
      const data = await r.json();
      audioUrl = data.audioUrl ?? null;
    } catch (_) {}

    if (!audioUrl) { resumeVideo(); return; }

    setQaMsg('Speaking…');
    const qaAudio = document.getElementById('qa-audio');
    qaAudio.src = audioUrl;
    qaAudio.onended = () => resumeVideo();
    qaAudio.onerror = () => resumeVideo();
    qaAudio.play();
  }

  function resumeVideo() {
    qaActive = false;
    const bar = document.getElementById('qa-bar');
    const hint = document.getElementById('qa-hint');
    if (bar) bar.classList.add('hidden');
    if (hint) hint.classList.remove('hidden');
    const videoEl = document.getElementById('vg-video');
    if (videoEl) {
      videoEl.currentTime = pausedAt;
      videoEl.play().catch(() => {});
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.code !== 'Space') return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
    const wrap = document.getElementById('vg-video-wrap');
    if (!wrap || wrap.classList.contains('hidden')) return;
    if (qaActive || spaceHeld) return;
    e.preventDefault();
    spaceHeld = true;
    startListening();
  });

  document.addEventListener('keyup', (e) => {
    if (e.code !== 'Space' || !spaceHeld) return;
    e.preventDefault();
    spaceHeld = false;
    stopListeningAndAsk();
  });
</script>
</body>
</html>
